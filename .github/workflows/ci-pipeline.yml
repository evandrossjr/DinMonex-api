# Nome do workflow que aparecerá na aba "Actions" do GitHub.
name: CI Pipeline para API DinMonex

# Define o gatilho (trigger) para o workflow.
# Neste caso, ele será executado a cada push na branch 'develop'.
on:
  push:
    branches: [ "develop" ]

# Define os jobs que serão executados.
jobs:
  # O único job que temos se chama 'build-and-test'.
  build-and-test:
    # Define o ambiente de execução. Usamos a versão mais recente do Ubuntu.
    runs-on: ubuntu-latest

    # Define os passos (steps) que o job executará em sequência.
    steps:
      # Passo 1: Checkout do código
      # Usa uma action oficial do GitHub para baixar o código do seu repositório.
      - name: Checkout do código
        uses: actions/checkout@v4

      # Passo 2: Configurar o Java JDK 21
      # Usa uma action para instalar e configurar o Java 21 no ambiente.
      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Passo 3: Cache das dependências do Maven
      # Este passo armazena as dependências baixadas para acelerar builds futuros.
      # Ele só baixará novamente as dependências se o pom.xml mudar.
      - name: Cache de dependências do Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # Passo 4: Build e Teste com Maven
      # Executa o comando do Maven para compilar o projeto e rodar os testes.
      # O comando 'package' já inclui a fase de 'test' por padrão.
      # Se qualquer teste falhar, o pipeline inteiro falhará, garantindo a qualidade.
      - name: Build e Teste com Maven
        run: mvn -B package --file pom.xml
